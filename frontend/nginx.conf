# Copilot Service Connect exposes the backend as the short hostname "backend"
# inside the env's service namespace. Use a resolver + variable target so
# nginx resolves the name at request time (not at boot) — otherwise the
# container fails to start if the backend task hasn't come up yet.
resolver 169.254.169.253 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service in the same Copilot environment.
    # Keeps frontend + backend same-origin so the browser doesn't need CORS
    # and cookies/auth flow naturally. The variable $upstream forces DNS
    # resolution per request (see resolver above).
    location /api/ {
        set $upstream "http://backend:3000";
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed assets (Vite output) are immutable; long-cache them.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else: try the literal path, then fall back to index.html
    # so client-side routes like /w/<slug> resolve without a 404.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
