# In deployed envs the ALB terminates TLS and sets X-Forwarded-Proto=https;
# nginx listens on plain http inside the container. Preserve the ALB's
# value when present so the backend constructs correct (https) callback
# URLs for OAuth. Fall back to $scheme when there's no ALB in front of us.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Default security headers. The site only renders trusted SPA assets
    # (no user-submitted HTML) and the API is same-origin, so a strict CSP
    # is realistic. 'unsafe-inline' on style-src keeps Tailwind's runtime
    # styles working without nonces; 'self' on script-src + connect-src
    # blocks third-party JS / cross-origin fetches by default. Tighten if
    # the app ever needs Google Fonts or analytics — listing the origins
    # explicitly is preferable to opening the policy back up.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS only meaningful behind an HTTPS terminator. The ALB in deployed
    # envs handles TLS; sending HSTS here ensures the browser remembers it.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy API calls to the backend service in the same Copilot environment.
    # Copilot Service Connect maps the short name "backend" via /etc/hosts
    # to the local envoy sidecar, which load-balances to backend tasks. Keep
    # the proxy_pass target static so nginx uses libc resolution (which
    # honors /etc/hosts) instead of a DNS resolver (which doesn't).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
    }

    # Hashed assets (Vite output) are immutable; long-cache them.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else: try the literal path, then fall back to index.html
    # so client-side routes like /w/<slug> resolve without a 404.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
