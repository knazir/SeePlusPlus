# In deployed envs the ALB terminates TLS and sets X-Forwarded-Proto=https;
# nginx listens on plain http inside the container. Preserve the ALB's
# value when present so the backend constructs correct (https) callback
# URLs for OAuth. Fall back to $scheme when there's no ALB in front of us.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    "~."    $http_x_forwarded_proto;
}

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service in the same Copilot environment.
    # Copilot Service Connect maps the short name "backend" via /etc/hosts
    # to the local envoy sidecar, which load-balances to backend tasks. Keep
    # the proxy_pass target static so nginx uses libc resolution (which
    # honors /etc/hosts) instead of a DNS resolver (which doesn't).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 60s;
    }

    # Hashed assets (Vite output) are immutable; long-cache them.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else: try the literal path, then fall back to index.html
    # so client-side routes like /w/<slug> resolve without a 404.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
