name: spp-${WORKTREE_SLUG:-main}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: spp-backend:dev
    container_name: spp-${WORKTREE_SLUG:-main}-backend
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      - ./backend:/app
      - /tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_REGION=${AWS_REGION:-us-west-2}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - EXEC_MODE=${EXEC_MODE:-local}
      - NODE_ENV=development
      - PORT=3000
      - LAMBDA_FUNCTION_NAME=${LAMBDA_FUNCTION_NAME:-}
      - USER_CODE_FILE_PREFIX=${USER_CODE_FILE_PREFIX:-main}
      - DATABASE_URL=postgres://spp:spp@postgres:5432/${DB_NAME:-seepp_main}
    depends_on:
      - code-runner-local-build
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: spp-${WORKTREE_SLUG:-main}-postgres
    environment:
      POSTGRES_USER: spp
      POSTGRES_PASSWORD: spp
      POSTGRES_DB: ${DB_NAME:-seepp_main}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  code-runner-local-build:
    build:
      context: ./code-runner
      dockerfile: local/Dockerfile
    image: spp-code-runner-local:dev
    deploy:
      replicas: 0
    command: echo "code-runner-local image built"
    networks:
      - no-internet

  # frontend is rebuilt from scratch at P3. Leaving this service commented
  # until there's a real Dockerfile to build; keeping the stanza here as a
  # reminder so future-me doesn't rewire ports.
  #
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #     args:
  #       SPP_API_URL: "http://localhost:${BACKEND_PORT:-3000}/api"
  #   image: spp-frontend:dev
  #   container_name: spp-${WORKTREE_SLUG:-main}-frontend
  #   ports:
  #     - "${FRONTEND_PORT:-4000}:4000"
  #   volumes:
  #     - ./frontend:/app
  #   environment:
  #     - NODE_ENV=development

networks:
  no-internet:
    driver: bridge
    internal: true

volumes:
  postgres_data:
